name: Fetch Shuffle Stats

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Roll monthly baseline
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime
          from zoneinfo import ZoneInfo

          month = datetime.now(ZoneInfo("America/New_York")).strftime("%Y-%m")
          try:
            with open("meta.json", "r", encoding="utf-8") as f:
              meta = json.load(f)
          except FileNotFoundError:
            meta = {}

          if meta.get("month") != month:
            with open("data.json", "r", encoding="utf-8") as f:
              data = json.load(f)
            with open("baseline.json", "w", encoding="utf-8") as f:
              json.dump(data, f, separators=(",", ":"))
            with open("meta.json", "w", encoding="utf-8") as f:
              json.dump({"month": month}, f, separators=(",", ":"))
            print(f"Rolled baseline to {month}")
          else:
            print(f"Baseline already current for {month}")
          PY

      - name: Fetch stats from Shuffle API
        run: |
          curl -s "https://affiliate.shuffle.com/stats/949cf925-a4e8-47c6-a7cb-3e2d99335d02" -o data.json
          echo "Fetched at $(date -u)"
          cat data.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'{len(d)} users, {sum(1 for u in d if u[\"lifetimeWagered\"]>0)} active')"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json baseline.json meta.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update leaderboard data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push
          fi
